<!--콜백함수-->
    <script>
      function getUserData(callback){
        setTimeout(() => {
          const userData ={name: "홍길동", age: 25};
          callback(userData);
        }, 1000)
      }

      getUserData(function () {
        console.log("hi");
      });


      function printMessage(message, callback) {
        callback(message);
      }
      printMessage("Hello,JavaScript",function(message){
        console.log(message);
      })

      function addAndCallback(num1, num2, callback) {
        callback(num1+ num2);
      }

      addAndCallback(1,2,function(a,b){
        console.log("덧셈결과:"+(a+b));
      })



    </script>

<!--    프로미스(Promise)
            - 콜백지옥을 해결하기위해 등장한 비동기 처리를 위한 객체

            프로미스 메서드
              - resolve :작업 성공 시
              - reject : 작업 실패 시

            프로미스 상태
              - pending :작업이 완료되지 않은 상태(대기 상태)
              - fulfilled: 작업이 성공적으로 완료된 상태(완료상태)
              - rejected: 작업이 실패한 상태(실패한 상태)
-->
