<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>09_regex</title>
</head>
<body>
<!--
    📁<정규 표현식>📁    : 정규표현식 보고 자유롭게 읽을 수 있기만 하면됨
    :특정 패턴의 문자열을 찾기 위한 표현식

    <문자패턴>
    a-z: 영어 알파벳 소문자
    A-Z: 영어 알파벳 대문자
    ㄱ-ㅎ: 한글
    가-힣: 한글
    0-9: 숫자
    \d: 숫자
    .: 임의의 문자 하나
    \w: 영어, 숫자, 언더스코어(_)

    <검색 패턴>
    []: 문자 하나(포함)
     ex) [a-z] 알파벳 소문자 하나
         [A-Z0-9] 알파벳 대문자 또는 숫자 하나
    [^]: 문자 하나 (제외)
      ex)[^0-9] 숫자 제외
         [^a-d] 알파벳 소문자 a,b,c,d 제외
    ^문자열: 시작하는 문자열
      ex) ^dog : dog로 시작하는 문자열
    문자열$: 끝나는 문자열
      ex) dog$ : dog로 끝나는 문자열

  <수량 패턴>
  ? : 있거나 없음(0번 또는 1번)
  * : 있거나 없음(0번 이상)
  + : 최소 한개 이상(1번 이상)
  {n} : n번
  {min, } :min번 이상
  {min, max} :min번 이상 max번 이하
-->
<!--
    정규식.test(비교할문자열) : 정규식 패턴에 일치하면 true, 일치하지 않으면 false
    -->
<script>
    let regExp = /[a-z]/;

    console.log(regExp.test("ABCD"));
    console.log(regExp.test("abcd"));
//     위 문자열에 소문자 하나라도 있으면 통과
    console.log(regExp.test("ABcD"));
//     이렇게 해도 통과한다는거임

    regExp = /[A-Z][A-Z][0-9][A-Z]/;

    console.log(regExp.test("AB8E"));
    //            통과
    // console.log(regExp.test("AB8e"));
//               비통과

    regExp = /^[a-z]/; // 시작 문자가 알파벳 소문자여야함
    console.log(regExp.test("Aaaaa"));

    regExp = /^[가-힣][0-9]+$/;
    // 1.시작문자열을 무조건 한글 ^[가-힣]
    // 2.숫자가 하나 이상 무조건 존재  [0-9]+
    // 3.숫자로 끝나야 함 [0-9]$
    console.log(regExp.test("나0")); //true
    console.log(regExp.test("가나다라")); //false
    console.log(regExp.test("가나다라5")); //false
//      한글 1개 오고나서 숫자가 와야해서 거짓
</script>
<!------------------------------------------------------->
<!--
    사용자 아이디 유효성 검사
        : 아이디는 영어(대/소문자) , 숫자만 가능
        : 아이디는 5자 이상 12자 이하만 가능
        -->
    <input type="text" id="user-id" oninput="validateId()">
    <div id="user-id-message"></div>

      <script>
        function validateId(){
          const userId = document.getElementById('user-id').value;
          const userIdMsg = document.getElementById('user-id-message');

          const pattern = /^[a-zA-Z0-9]{5,12}$/;

          if (pattern.test(userId)) {
            userIdMsg.textContent = '사용가능한 아이디 입니다.';
            userIdMsg.style.color = 'blue';
            userIdMsg.style.fontSize = '12px';
          }else if (userId === "") {
            userIdMsg.textContent = "";
          } else {
            userIdMsg.textContent = '사용 불가능한 아이디 입니다.';
            userIdMsg.style.color = 'red';
            userIdMsg.style.fontSize = '12px';
          }
        }
      </script>
<!------------------------------------------------------>
<!--
      비밀번호 유효성 검사
          : 영어(대/소문자) 무조건 포함
          : 숫자 무조건 포함
          : 특수문자 무조건 포함
          : 8자이상 30자 이하
      -->

    <input type="password" id="user-password" oninput="validatePsw()">
    <div id="user-password-msg" ></div>
        <script>
            function  validatePsw(){
              const userPsw = document.getElementById('user-password').value;
              const userPswMsg = document.getElementById('user-password-msg');

              const pattern = /^(?=.*[A-Za-z])(?=.*[0-9])(?=.*[!@#$])[A-Za-z0-9!@#$]{8,30}$/;
              // 전방탐색 : (?=)
              //    - 앞에서부터 문자열을 탐색하는 패턴
            //      - .* 임의의 문자(.)가 0개 이상(*)

              if (userPsw === "") {
                userPswMsg.textContent ="";
              } else if (pattern.test(userPsw)) {
                userPswMsg.textContent = "사용 가능한 비밀번호입니다.";
                userPswMsg.style.color = "blue";
                userPswMsg.style.fontSize = "12px";
              } else {
                userPswMsg.textContent = "사용 불가능한 비밀번호입니다.";
                userPswMsg.style.color = "red";
                userPswMsg.style.fontSize = "12px";
              }
            }
        </script>

        <input type="email" id="user-email" oninput="validateEmail()">
        <div id="email-msg"></div>

          <script>
            function validateEmail(){
              const userEmail = document.getElementById('user-email').value;
              const emailMsg = document.getElementById('email-msg');

              const pattern = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
                //1. ^[^\s@]+
                //   - 공백문자(\s)와 @를 제외하고 나머지 문자 1개이상(+)으로 시작(^)
                //2. @
                //   - 이메일에 들어가는 @
                //3. [^\s@]+
                //   - 도메인 주소가 되는 부분
                //   - 공백문자와 @를 제외하고 나머지 문자 1개 이상(+)
                //4. \.
                //   - 문자 마침표를 의미
                //   - 앞에 역슬레시 붙으면 원래 가지고 있던 기능을 없애고 문자로 인식
                //5. [^\s@]{2,}$
                //   - 공백문자와 @를 제외하고 2자이상({2,})으로 끝남($)

              if (userEmail === "") {
                emailMsg.textContent = "";
              }else if (pattern.test(userEmail)) {
                emailMsg.textContent = "사용가능한 이메일입니다.";
                emailMsg.style.color = 'blue';
                emailMsg.style.fontSize = '12px';
              } else {
                emailMsg.textContent = "사용 불가능한 이메일입니다.";
                emailMsg.style.color = 'red';
                emailMsg.style.fontSize = '12px';
              }
            }
          </script>



</body>
</html>
