<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>18_Fetch</title>
</head>
<body>
    <h2>fetch 사용해보기</h2>
    <button onclick="loadUsers()">데이터 조회하기</button>
    <ul id="user-list"></ul>

    <script>

       // fetch
       //    - 브라우저에 제공하는 비동기 HTTP 요청 API
       //      > 다른 방식: XMLHttpRequest, jQuery ajax

        //  특징
        //    -Promise 기반API
        //    -비동기 통신 지원
        //    - Json 최적화
        //    - 코드 간결

        // 동작 과정
        // 1.JavaScript CallStack에 올라감
        //      -fetch 실행
        // 2. Browser Web APIs로 옮겨간 후 Http 요청 실행
        // 3. 서버 응답이 오면 Promuse Resolve() 실행행
        // 4. MicroTask Queue로 이동

        async function loadUsers(){
            try {
               // fetch 요청(해당 url)
                const response = await fetch('https://jsonplaceholder.typicode.com/users');
                console.log(response)

                //Json 변환
                const users = await response.json();
                console.log(users);

                const list = document.getElementById('user-list');

                users.forEach((user) => {
                    const li = document.createElement("li");
                    li.textContent = `이름: ${user.name} (${user.email})`;
                    list.appendChild(li);
                })

            } catch (error){
                console.error("에러발생:", error);

            }
        }
    </script>
</body>
</html>
