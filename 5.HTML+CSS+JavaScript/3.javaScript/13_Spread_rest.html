<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>13_Spread_rest</title>
<!--    연산자-->

<body>
        <script>
           // ▶1. 스프레드 연산자
           //    -배열, 문자열과 같은 반복 가능한 객체를 개별 요소로 분리
           const numbers = [1, 2, 3, 4, 5];
           const str = "Hello, World";

           // "..."사용
           console.log(...numbers);
           console.log(...str);

           function spreadFunc(num1, num2, num3, num4, num5){
               console.log(num1);
           }

           spreadFunc(...numbers);


           // ▶2. 레스트 연산자
        //          -스프레드 연산자가 요소를 분리하는 거였다면 레스트 연산자는
        //           요소를 하나로 모아주는 연산자 ` ...`사용 (사용위치에 따라 다름)
           const arr = [1, 2, 3, 4, 5];

           function restFunc(...numbers){  //자바의 가변길이 매개변수같은거
               console.log(numbers);
           }
           restFunc(1,2,3,4,5);


        //    3.배열 병합
           const arry1 =[10,20,{name:"이소정", age: 19}];
           const arry2 =[300,400,{name:"홍길동", age: 22}];

           const mergeArr = [...arry1, ...arry2];
           console.log(mergeArr);

           mergeArr[0] =999;
           mergeArr[2].name ="짱구";
           mergeArr[3] = 777;
           mergeArr[5].name ="현수";
           console.log(mergeArr);

           console.log(arry1);
           console.log(mergeArr);


        </script>

</body>
</html>
