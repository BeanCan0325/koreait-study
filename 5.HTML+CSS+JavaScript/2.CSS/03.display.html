<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>03.display</title>

  <style>
    div {
        width:  100px;
        border: 10px groove black;
        padding: 10px 7px 5px 3px;
        /*overflow: */
        overflow: auto;
    }

    p {
       display: inline;
    /*  블록레벨 -> 인라인레벨로 변환*/
    }

    span {
        display: block;
    }

    strong {
    /*  안보이게: 화면에도 없고 공간도 차지않함*/
        display: none;
    }
  </style>
</head>
<body> <!-- body에 기본으로8px margin 들가있음 -->
<!--블록태그-->
    <div>➡️div 태그 aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa</div>
    <p>➡️p 태그</p>
    <h3>➡️h3 태그</h3>
    <hr>

<!--인라인 태그-->
    <span>➡️span 태그</span>
    <a href="">➡️a 태그</a>
    <strong>➡️strong 태그</strong>

<!--<span> :특정 글자를 묶어서 뭘 줄때 사용-->

<!--padding vs boarder vs margin-->
</span>

</body>
</html>
