<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>04.position</title>
    <style>
        /*.box {*/
        /*    width: 100px;*/
        /*    height: 100px;*/
        /*    background-color: violet;*/
        /*    position: relative;*/
        /*    top: 20px;*/
        /*    left: 30px;*/
        /*}*/

        #boxes {
            width: 200px;
            height: 200px;
            border: 1px solid black;
            position: relative;
        }
        .absolute-box {
            width: 50px;
            height: 50px;
            border: 1px solid black;
            position: absolute;
        }

        .box4 {
            top: 60px;
            left: 60px;
            background-color: coral;
            z-index: 3; /* z-index(zero index): 기본값 0 */
        }

        .box5 {
            top: 80px;
            left: 80px;
            background-color: darkgreen;
            z-index: 2;
        }
        .box6 {
            top: 100px;
            left: 100px;
            background-color: #a3665b;
        }

        .box2 {
            width: 200px;
            height: 200px;
            border: 1px solid black;
        }
        
        .box3 {
            width: 100px;
            height: 100px;
            background-color: cyan;
            position: fixed;
            right: 20px;
        }

        .child-box2 {
            width: 100px;
            height: 100px;
            background-color: cornflowerblue;

            position: absolute;
            top: 50px;
            left: 20px;
        }
    </style>
</head>
<body>
    <div class="box">Box</div>

    <div class="box2">
        Box2
         <div class="child-box2">
             child-box2
         </div>
    </div>

    <div class="box3"> Box3</div>

    <div  id="boxes">
        <div class="absolute-box box4">box4</div>
        <div class="absolute-box box5">box5</div>
        <div class="absolute-box box6">box6</div>
    </div>
    <br><br><br><br><br><br><br><br><br>

</body>
</html>
