<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>07_fetch</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f8;
      padding: 40px;
    }

    /* 게시판 영역 */
    .board-container {
      width: 900px;
      margin: auto;
      background: white;
      border-radius: 10px;
      padding: 25px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
    }

    /* 제목 */
    .board-title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    /* 테이블 */
    .board-table {
      width: 100%;
      border-collapse: collapse;
    }

    .board-table th {
      background: #2f80ed;
      color: white;
      padding: 12px;
    }

    .board-table td {
      border-bottom: 1px solid #ddd;
      padding: 10px;
    }

    /* hover 효과 */
    .board-table tbody tr:hover {
      background: #f1f5ff;
    }

    /* 로딩 표시 */
    .loading {
      text-align: center;
      padding: 20px;
      font-size: 18px;
    }
  </style>
</head>
<body>
<div class="board-container">

  <div class="board-title">
    Fetch API 게시판
  </div>

  <table class="board-table">
    <thead>
    <tr>
      <th>ID</th>
      <th>제목</th>
      <th>내용</th>
    </tr>
    </thead>

    <tbody id="board-body">
    <tr>
      <td colspan="3" class="loading">
        데이터 로딩중...
      </td>
    </tr>
    </tbody>
  </table>

</div>
    <script>

      //async 함수
      async  function load(){
        try { /*STUDY: ▶▶async & await : 🪡 바늘과 실
               - async : 함수 앞에 붙는 딱지 ( 이 함수는 비동기 작업이 들어있는 함수야)
               - await : 함수 안에 정지 버튼 ( 여기서 결과가 나올 때 까지 다음 줄로 넘어가지 말고 잠깐 기다려)
          */ //STUDY: ▶▶try...catch :  try블록( 이코드를 실행하는데,) catch(만약 try안에 문제가 생기면  catch쪽으로 넘어와)
          const response = await fetch('https://jsonplaceholder.typicode.com/posts');
          const posts = await response.json();
          const boardBody = document.getElementById('board-body');
          boardBody.innerHTML = '';

          posts.forEach((post) => {
            const tr = document.createElement("tr");
            tr.innerHTML = ` //inner HTML 보안에 취약해서 안쓰는게 좋음
                  <td>${post.id}</td>
                  <td>${post.title}</td>
                  <td>${post.body}</td>
              `;
            // 대체 코드
            /*
                const tr = document.createElement("tr");
                const tdId =document.createElement("td");
                const tdTitle =document.createElement("td");
                const tdBody = document.createElemebt(:td);

                tdid.textContent =post.id;
                rdTitle.textContent =post.title;
                tdBody.textContent = post.Body;

                tr.appendChild(tdId);
                tr.appendchild(tdTitle);
                tr.appendChild()
             */

            boardBody.appendChild(tr);
          });
        } catch (error){
          console.log("게시판 로딩 실패:", error);
          document.getElementById('board-body').innerHTML = '<tr><td colspan="3">데이터를 불러오지 못했습니다.</td></tr>';

          }
      }
          //post 요청하여 생성

      //페이지 로드시 실행
      //   - HTML의 DOM Tree 가 완전히 다 생성되고 난 후 발생하는 이벤트
      document.addEventListener("DOMContentLoaded",()=>{
        load();
      })
    </script>
</body>
</html>
