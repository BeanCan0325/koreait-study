<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS DOM Practice</title>
</head>

<body>
<!----------------------------------------------------------------->

    <fieldset>
        <legend>문제1</legend>
        <h4>div 태그의 배경색을 빨간색으로 변경하세요.</h4>
        <div id="my-div">이 div의 배경색을 변경하세요.</div>
        <button onclick="changeBackgroundColor()">배경색 변경</button>
    </fieldset>

        <script>
            function changeBackgroundColor(){
                const q1_div = document.getElementById('my-div');

                q1_div.style.backgroundColor = "red";
            }

        </script>
<!----------------------------------------------------------------->

    <fieldset>
        <legend>문제2</legend>
        <h4>이미지를 클릭하면 이미지의 크기가 2배로 확대되도록 작성하세요.</h4>
        <img id="my-image" src="https://picsum.photos/200/150" width="200" height="150" onclick="zoomImage()">
    </fieldset>

        <script>
            function zoomImage() {
                const q2_img = document.getElementById('my-image');
                q2_img.width = q2_img.width*2;
                q2_img.height = q2_img.height*2;

            }
        </script>
<!----------------------------------------------------------------->

    <fieldset>
        <legend>문제3❌❌</legend>
        <h4>input에 입력한 값을 todo 리스트에 추가하세요.</h4>
        <input type="text" id="todo-input" placeholder="할 일을 입력하세요">
        <button onclick="addTodo()">추가</button>
        <ul id="todo-list">

        </ul>
    </fieldset>
<!--⭐.createElement  // .appendChild()-->
        <script>

            function addTodo(){
                const q3_input = document.getElementById('todo-input');
                const q3_list = document.getElementById('todo-list');

                const li = document.createElement("li");

                li.textContent =q3_input.value;

                q3_list.appendChild(li);

            }
        </script>
<!----------------------------------------------------------------->

    <fieldset>
        <legend>문제4✍️</legend>
        <h4>버튼을 클릭하면 p태그의 배경색을 변경하세요.</h4>
        <p id="color-text">이 문단의 배경색을 변경하세요.</p>
        <button onclick="changeColor('red')">빨간색 배경</button>
        <button onclick="changeColor('yellow')">노란색 배경</button>
        <button onclick="changeColor('aqua')">아쿠아색 배경</button>
    </fieldset>
        <script>
            function changeColor(color) {
                const pTag = document.getElementById('color-text');

                pTag.style.backgroundColor = color;
            }
        </script>
<!----------------------------------------------------------------->

    <fieldset>
        <legend>문제5❌❌❌</legend>
        <h4>입력값에 따라 링크를 생성하세요.</h4>
        <p style="margin:0px" id="goLink" >바로가기</p>

        <input type="text" id="link-input" placeholder="네이버 / 다음 / 구글">
        <button onclick="addLink()">링크 추가</button>
        <ul id="link-list">

        </ul>
    </fieldset>

        <script>
            function addLink(){
                const q5_input = document.getElementById('link-input').value;
                const q5_ul = document.getElementById('link-list');
                const baro = document.getElementById('goLink');

                const li = document.createElement("li");
                const aTag = document.createElement("a");
                aTag.target = "_blank";

                switch (q5_input){
                    case '네이버':
                        aTag.href = "https://www.naver.com";
                        break;

                    case '다음':
                        aTag.href ="https://www.daum.net";
                        break;

                    case '구글':
                        aTag.href ="https://www.google.com";
                        break;
                }

                aTag.target = "_blank";
                li.appendChild(aTag);
                // q5_ul.appendChild(li);

                baro.appendChild(aTag.cloneNode(true));

                baro.style.cursor = "pointer";
                baro.onclick = function () {
                    window.location.href = aTag.href;
                };

            }
        </script>
<!----------------------------------------------------------------->

    <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
</body>
</html>
