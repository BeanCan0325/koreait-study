    <section class="login-section">
        <h2>1.로그인</h2>
        <div class="form-group">
            <label>아이디</label>
            <input type="text" id="login-id" placeholder="user 입력">
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="login-pw" placeholder="qwer1234! 입력">
        </div>
        <button id="btn-login" onclick="Q1_validate()">로그인</button>
    </section>
    <script>
        //     <로그인>
        //      * 공통 : 비어있는 문자 불가(로그인 버튼 클릭 시)
        //      * const id = "user";   /  const pwd = "qwer1234!"
        //          - 아이디 또는 비밀번호를 입력하지 않을 경우 : alert "아이디 또는 비밀번호를 입력해주세요." 출력 
        //          - 아이디 또는 비밀번호가 일치하지 않을 경우 : alert "아이디 또는 비밀번호가 틀렸습니다." 출력
        //          - 위의 변수와 모두 일치 할 경우 : alert "로그인 되었습니다." 출력
            function Q1_validate(){
                const q1_id = document.getElementById('login-id').value;
                const q1_pwd = document.getElementById('login-pw').value;

                if (q1_id === "" || q1_pwd === ""){
                    alert("아이디 또는 비밀번호를 입력하세요.");
                }else if (q1_id !== "user" || q1_pwd !== "qwer1234!"  ){
                    alert("아이디 또는 비밀번호가 틀렸습니다.");
                } else {
                    alert("로그인 되었습니다.");
                }
            }


    </script>

    <section class="contact-section">
        <h2>3.연락하기</h2>
        <div class="form-group">
            <label>이름</label>
            <input type="text" id="contact-name" placeholder="한글 이름">
        </div>
        <div class="form-group">
            <label>이메일</label>
            <input type="email" id="contact-email" placeholder="example@test.com">
        </div>
        <div class="form-group">
            <label>메시지</label>
            <textarea id="contact-msg" maxlength="500" placeholder="메시지를 입력해 주세요 (최대 500자)" oninput="Q3_charCount()"></textarea>
            <div class="char-count"><span id="msg-count">0</span> / 500</div>
        </div>
        <button id="btn-contact" onclick="Q3_validation()">전송</button>
    </section>
    <script>
        //     <연락하기>
        //      - 이름 : 한글만 가능
        //      - 이메일 : 이메일 주소가 유효한지 확인   ex) test@test.com
        //      - 메시지 : 사용자가 입력한 글자를 실시간으로 업데이트 / 최대 500글자까지 사용 가능

        //      * 전송 버튼 클릭 시
        //          - 이름에 한글말고 다른게 있으면 alert "이름은 한글만 사용 가능합니다"
        //          - 이메일 주소가 유효하지 않으면 alert "이메일 양식이 유효하지 않습니다."

        //     * 공통 : 비어있는 문자 불가(전송 버튼 클릭 시)
        //          - 이름이 비어있다면 alert "이름을 입력해주세요"
        //          - 이메일이 비어있다면 alert "이메일을 입력해주세요."
        //          - 메시지가 비어있다면 alert "메시지를 입력해주세요."

        function Q3_validation(){
            const q3_name = document.getElementById('contact-name').value;
            const q3_email = document.getElementById('contact-email').value;
            const q3_msg = document.getElementById('contact-msg').value;

            const q3_name_pattern = /^[가-힣]+$/;
            const q3_email_pattern = /^[a-zA-Z0-9]+@[a-zA-Z0-9]+\.[a-zA-Z0-9]{2,}$/;

            const fields = [
                {value:q3_name, name: "이름"},
                {value:q3_email, name: "이메일"},
                {value:q3_msg, name: "메세지"}
            ]

            for (let field of fields) {
                if (field.value === "") {
                    alert(field.name + "을 입력해주세요.");
                    return;
                }
            }

            if (!q3_name_pattern.test(q3_name)){
                alert("이름은 한글만 가능합니다.");
            } else if (!q3_email_pattern.test(q3_email)){
                alert("이메일양식이 유효하지 않습니다.");
            }

        }

            function Q3_charCount(){
                const q3_msg = document.getElementById('contact-msg').value;
                const q3_div = document.getElementById('msg-count');
                let q3_msgCount = q3_msg.length;

                q3_div.textContent = q3_msgCount;

            }
    </script>

    <section class="join-section">
        <h2>4.회원가입</h2>
        <div class="form-group">
            <label>이름</label>
            <input type="text" id="join-name" placeholder="한글만 입력">
            <div id="msg-name" class="msg"></div>
        </div>
        <div class="form-group">
            <label>아이디</label>
            <input type="text" id="join-id" placeholder="5~20자 영문, 숫자, _, -">
            <div id="msg-id" class="msg"></div>
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="join-pw" placeholder="8~16자 대소문자/특수/숫자 포함">
            <div id="msg-pw" class="msg"></div>
        </div>
        <div class="form-group">
            <label>비밀번호 확인</label>
            <input type="password" id="join-pw2" placeholder="비밀번호 재입력">
            <div id="msg-pw2" class="msg"></div>
        </div>
        <button id="btn-join" onclick="Q4_validation()">회원 가입</button>
    </section>
    <script>
        //     <회원가입>
        //      - 이름 : 한글만 가능
        //      - 아이디 : 영어, 숫자, 특수기호(_),(-)만 가능 / 5자 이상 20자 이하
        //      - 비밀번호 : 대소문자 또는 특수문자, 숫자 최소 1개 이상 / 8자리 이상 16자 이하
        //      - 비밀번호 확인 : 비밀번호와 동일해야 함

        //      * 일치하지 않을 경우 input의 아래 부분에 텍스트 출력(keyup 이벤트 활용)
        //          - 이름이 일치하지 않을 경우 : "한글만 사용 가능합니다."    // 색상 red
        //          - 이름이 일치할 경우 : ""   (빈 문자열 출력)

        //      - 아이디가 일치하지 않을 경우 : "5~20자의 영문 소문자, 숫자와 특수기호(_),(-)만 사용 가능합니다."    // 색상 red
        //      - 아이디가 일치할 경우 : "사용 가능한 아이디입니다."    // 색상 green

        //      - 비밀번호가 일치하지 않을 경우 : "8~16자의 영문 대/소문자, 숫자, 특수문자를 사용해 주세요."    // 색상 red
        //      - 비밀번호가 일치할 경우 : "사용 가능한 비밀번호입니다."    // 색상 green

        //      - 비밀번호 확인이 비밀번호와 일치하지 않을 경우 : 비밀번호가 일치하지 않습니다."    // 색상 red
        //      - 비밀번호 확인이 비밀번화 일치할 경우 : "비밀번호가 일치합니다."    // 색상 green

        //      * 공통 : 비어있는 문자 불가(회원 가입 버튼 클릭 시) 
        //          - 비어있다면 alert "이름을 입력해주세요."
        //          - 아이디가 비어있다면 alert "아이디를 입력해주세요."
        //          - 비밀번호가 비어있다면 alert "비밀번호를 입력해주세요."
        //          - 비밀번호 확인이 일치하지 않는다면 alert "비밀번호가 일치하지 않습니다"

	    //	    * 공통 : 모든 유효성 검사가 통과해야 회원가입 버튼 클릭 시 "회원가입이 완료되었습니다" alert 출력
	    // 		    - 유효성 검사가 1개라도 실패했다면 "입력값을 다시 확인해주세요." alert 출력


            //[유효성 검사]
            const q4_name_validation = /^[가-힣]+$/;
            const q4_id_validation = /^[a-zA-Z0-9_-]{5,20}$/;
            const q4_pwd_validation = /^(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#$])[A-Za-z0-9!@#$].{8,16}$/; //. 오는거차이

        function Q4_validation() {

            // 값 가져오기
            const q4_name = document.getElementById('join-name').value;
            const q4_id = document.getElementById('join-id').value;
            const q4_pwd = document.getElementById('join-pw').value;
            const q4_pwdCheck = document.getElementById('join-pw2').value;

            const q4_name_msg = document.getElementById('msg-name');
            const q4_id_msg = document.getElementById('msg-id');
            const q4_pwd_msg = document.getElementById('msg-pw');
            const q4_pwdCheck_msg = document.getElementById('msg-pw2');

            // A: 공통: 비었는지 확인
            if (q4_name === ""){alert("이름을 입력해주세요.")}

            if (q4_pwd !== q4_pwdCheck) {
                q4_pwd_msg.textContent = "8~16자의 영문 대/소문자, 숫자, 특수문자를 사용해 주세요.";
                q4_pwd_msg.style.color = "red";
            } else if (!q4_name_validation.test(q4_name)) {
                q4_name_msg.textContent = "한글만 사용 가능합니다.";
                q4_name_msg.style.color = "red";
            } else if (!q4_id_validation.test(q4_id)) {
                q4_id_msg.textContent = "5~20자의 영문 소문자, 숫자와 특수기호(_),(-)만 사용 가능합니다.";
                q4_id_msg.style.color = "red";
            } else if (q4_id_validation.test(q4_id)) {
                q4_id_msg.textContent = "사용 가능한 아이디입니다.";
                q4_id_msg.style.color = "green";
            }else if (!q4_pwd_validation.test(q4_pwdCheck)) {
                q4_pwd_msg.textContent = "비밀번호가 일치하지 않습니다.";
                q4_pwd_msg.style.color = "red";
            }else if (q4_pwd_validation.test(q4_pwdCheck)) {
                q4_pwd_msg.textContent = "비밀번호가 일치합니다.";
                q4_pwd_msg.style.color = "green";
            }
        }



    </script>
</body>
